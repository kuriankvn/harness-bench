<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic-Tac-Toe</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff;
}

.container {
    text-align: center;
    padding: 2rem;
}

h1 {
    font-size: 2.5rem;
    margin-bottom: 0.5rem;
    letter-spacing: 2px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
}

.status {
    font-size: 1.3rem;
    margin-bottom: 1.5rem;
    min-height: 1.8rem;
    font-weight: 500;
    opacity: 0.95;
}

.board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    width: min(85vw, 340px);
    margin: 0 auto 2rem;
}

.cell {
    aspect-ratio: 1;
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(10px);
    border: 2px solid rgba(255, 255, 255, 0.25);
    border-radius: 14px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: min(18vw, 4rem);
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    user-select: none;
    color: #fff;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
}

.cell:hover:not(.taken):not(.game-over) {
    background: rgba(255, 255, 255, 0.28);
    transform: scale(1.04);
}

.cell.taken {
    cursor: default;
}

.cell.game-over {
    opacity: 0.7;
}

.cell.win-cell {
    background: rgba(255, 215, 0, 0.35);
    box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
    transform: scale(1.08);
    animation: winPulse 0.8s ease-in-out infinite alternate;
}

@keyframes winPulse {
    from { box-shadow: 0 0 15px rgba(255, 215, 0, 0.4); }
    to   { box-shadow: 0 0 30px rgba(255, 215, 0, 0.7); }
}

.x-mark { color: #ff6b9d; }
.o-mark { color: #48dbfb; }

.reset-btn {
    background: rgba(255, 255, 255, 0.2);
    border: 2px solid rgba(255, 255, 255, 0.4);
    color: #fff;
    font-size: 1rem;
    padding: 0.7rem 2rem;
    border-radius: 50px;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
}

.reset-btn:hover {
    background: rgba(255, 255, 255, 0.35);
    transform: scale(1.05);
}

.reset-btn:active {
    transform: scale(0.97);
}

@media (max-width: 400px) {
    h1 { font-size: 1.8rem; }
    .status { font-size: 1.1rem; }
}
</style>
</head>
<body>
<div class="container">
    <h1>Tic-Tac-Toe</h1>
    <p class="status" id="status">Player X's turn</p>
    <div class="board" id="board"></div>
    <button class="reset-btn" id="resetBtn">Reset Game</button>
</div>

<script>
(function() {
    var BOARD_SIZE = 3;
    var WIN_LINES = [
        [0,1,2],[3,4,5],[6,7,8],
        [0,3,6],[1,4,7],[2,5,8],
        [0,4,8],[2,4,6]
    ];

    var board;
    var currentPlayer;
    var gameOver;

    var statusEl = document.getElementById('status');
    var boardEl  = document.getElementById('board');
    var resetBtn = document.getElementById('resetBtn');

    function init() {
        board = Array(9).fill(null);
        currentPlayer = 'X';
        gameOver = false;
        renderBoard();
        updateStatus("Player X's turn");
    }

    function otherPlayer(p) { return p === 'X' ? 'O' : 'X'; }

    function checkWinner(b) {
        for (var i = 0; i < WIN_LINES.length; i++) {
            var line = WIN_LINES[i];
            var a = board[line[0]], c = board[line[1]], d = board[line[2]];
            if (a && a === c && a === d) {
                return { winner: a, line: line };
            }
        }
        return null;
    }

    function updateStatus(msg) {
        statusEl.textContent = msg;
    }

    function renderBoard() {
        boardEl.innerHTML = '';
        for (var i = 0; i < 9; i++) {
            var cell = document.createElement('div');
            cell.className = 'cell';
            cell.setAttribute('data-index', i);

            if (board[i]) {
                cell.textContent = board[i];
                cell.classList.add('taken');
                cell.classList.add(board[i] === 'X' ? 'x-mark' : 'o-mark');
            }

            if (gameOver) cell.classList.add('game-over');

            (function(idx) {
                cell.addEventListener('click', function() { handleClick(idx); });
            })(i);

            boardEl.appendChild(cell);
        }
    }

    function handleClick(index) {
        if (gameOver || board[index]) return;

        board[index] = currentPlayer;

        var winResult = checkWinner(board);
        if (winResult) {
            gameOver = true;
            updateStatus('Player ' + winResult.winner + ' wins!');
            renderBoard();
            highlightWin(winResult.line);
            return;
        }

        if (board.every(function(c) { return c !== null; })) {
            gameOver = true;
            updateStatus("It's a draw!");
            renderBoard();
            return;
        }

        currentPlayer = otherPlayer(currentPlayer);
        updateStatus("Player " + currentPlayer + "'s turn");
        renderBoard();
    }

    function highlightWin(line) {
        var cells = boardEl.querySelectorAll('.cell');
        for (var i = 0; i < line.length; i++) {
            cells[line[i]].classList.add('win-cell');
        }
    }

    resetBtn.addEventListener('click', init);
    init();
})();
</script>
</body>
</html>
