<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic-Tac-Toe</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      font-family: system-ui, -apple-system, sans-serif;
      color: #f1f5f9;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 24px;
      width: 100%;
      max-width: 420px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #f1f5f9;
    }

    #status {
      font-size: 1.1rem;
      font-weight: 600;
      color: #94a3b8;
      min-height: 1.6em;
      text-align: center;
      transition: color 0.2s;
    }

    #status.winner { color: #34d399; }
    #status.draw   { color: #fbbf24; }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      width: 100%;
    }

    .cell {
      aspect-ratio: 1;
      background: #1e293b;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(2.5rem, 10vw, 4rem);
      font-weight: 900;
      cursor: pointer;
      border: 2px solid transparent;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .cell:hover:not(.taken) {
      background: #263348;
      border-color: #334155;
    }

    .cell:active:not(.taken) { transform: scale(0.94); }

    .cell.taken { cursor: default; }

    .cell.x { color: #60a5fa; }
    .cell.o { color: #f472b6; }

    .cell.winning {
      background: #1d3a28;
      border-color: #34d399;
      animation: pop 0.25s ease;
    }

    @keyframes pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    button#reset {
      padding: 12px 36px;
      font-size: 1rem;
      font-weight: 700;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: 0.3px;
    }

    button#reset:hover  { background: #2563eb; }
    button#reset:active { transform: scale(0.96); }
  </style>
</head>
<body>
  <div class="container">
    <h1>Tic-Tac-Toe</h1>
    <div id="status">X's turn</div>
    <div class="board" id="board">
      <div class="cell" data-i="0"></div>
      <div class="cell" data-i="1"></div>
      <div class="cell" data-i="2"></div>
      <div class="cell" data-i="3"></div>
      <div class="cell" data-i="4"></div>
      <div class="cell" data-i="5"></div>
      <div class="cell" data-i="6"></div>
      <div class="cell" data-i="7"></div>
      <div class="cell" data-i="8"></div>
    </div>
    <button id="reset">Reset</button>
  </div>

  <script>
    const LINES = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, over;

    function init() {
      board   = Array(9).fill(null);
      current = 'X';
      over    = false;

      document.querySelectorAll('.cell').forEach(c => {
        c.textContent = '';
        c.className   = 'cell';
      });

      setStatus(`X's turn`);
    }

    function setStatus(msg, type = '') {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className   = type;
    }

    function checkWinner() {
      for (const [a, b, c] of LINES) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return [a, b, c];
        }
      }
      return null;
    }

    document.getElementById('board').addEventListener('click', e => {
      const cell = e.target.closest('.cell');
      if (!cell || over) return;

      const i = Number(cell.dataset.i);
      if (board[i]) return;

      board[i] = current;
      cell.textContent = current;
      cell.classList.add('taken', current.toLowerCase());

      const win = checkWinner();
      if (win) {
        over = true;
        win.forEach(idx => {
          document.querySelector(`[data-i="${idx}"]`).classList.add('winning');
        });
        setStatus(`${current} wins!`, 'winner');
        return;
      }

      if (board.every(Boolean)) {
        over = true;
        setStatus("It's a draw!", 'draw');
        return;
      }

      current = current === 'X' ? 'O' : 'X';
      setStatus(`${current}'s turn`);
    });

    document.getElementById('reset').addEventListener('click', init);

    init();
  </script>
</body>
</html>
