<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #eee;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 32px 20px;
      width: 100%;
      max-width: 420px;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 0.05em;
      color: #e0e0ff;
    }

    .status {
      font-size: 1.15rem;
      min-height: 1.6em;
      text-align: center;
      color: #b0b0d0;
      transition: color 0.2s;
    }

    .status.winner { color: #7fffb2; font-weight: 600; }
    .status.draw   { color: #ffd700; font-weight: 600; }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      width: 100%;
    }

    .cell {
      aspect-ratio: 1;
      background: #16213e;
      border: 2px solid #2a2a5a;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(2.5rem, 12vw, 4rem);
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      user-select: none;
      color: transparent;
    }

    .cell:hover:not(.taken) {
      background: #1e2d5a;
      border-color: #4a4a8a;
      transform: scale(1.04);
    }

    .cell.x { color: #6eb5ff; }
    .cell.o { color: #ff8fa3; }

    .cell.winning {
      background: #1e3a2a;
      border-color: #4caf7a;
      box-shadow: 0 0 16px #4caf7a55;
      animation: pulse 0.6s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    .cell.taken { cursor: default; }

    button.reset {
      padding: 12px 36px;
      font-size: 1rem;
      font-weight: 600;
      background: #3a3a7a;
      color: #e0e0ff;
      border: 2px solid #5a5aaa;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.15s, transform 0.1s;
    }

    button.reset:hover {
      background: #4a4a9a;
      transform: translateY(-1px);
    }

    button.reset:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Tic-Tac-Toe</h1>
    <div class="status" id="status">Player X's turn</div>
    <div class="board" id="board">
      <div class="cell" data-index="0"></div>
      <div class="cell" data-index="1"></div>
      <div class="cell" data-index="2"></div>
      <div class="cell" data-index="3"></div>
      <div class="cell" data-index="4"></div>
      <div class="cell" data-index="5"></div>
      <div class="cell" data-index="6"></div>
      <div class="cell" data-index="7"></div>
      <div class="cell" data-index="8"></div>
    </div>
    <button class="reset" id="reset">Reset</button>
  </div>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8], // rows
      [0,3,6],[1,4,7],[2,5,8], // cols
      [0,4,8],[2,4,6]          // diagonals
    ];

    let board, current, gameOver;

    const cells  = document.querySelectorAll('.cell');
    const status = document.getElementById('status');

    function init() {
      board    = Array(9).fill(null);
      current  = 'X';
      gameOver = false;

      cells.forEach(c => {
        c.textContent = '';
        c.className   = 'cell';
      });

      status.textContent = "Player X's turn";
      status.className   = 'status';
    }

    function checkWinner() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return { winner: board[a], line: [a, b, c] };
        }
      }
      return null;
    }

    function handleClick(e) {
      const cell = e.target.closest('.cell');
      if (!cell || gameOver) return;

      const idx = parseInt(cell.dataset.index, 10);
      if (board[idx]) return;

      board[idx]        = current;
      cell.textContent  = current;
      cell.classList.add('taken', current.toLowerCase());

      const result = checkWinner();
      if (result) {
        gameOver = true;
        result.line.forEach(i => cells[i].classList.add('winning'));
        status.textContent = `Player ${result.winner} wins!`;
        status.className   = 'status winner';
        return;
      }

      if (board.every(Boolean)) {
        gameOver = true;
        status.textContent = "It's a draw!";
        status.className   = 'status draw';
        return;
      }

      current            = current === 'X' ? 'O' : 'X';
      status.textContent = `Player ${current}'s turn`;
    }

    document.getElementById('board').addEventListener('click', handleClick);
    document.getElementById('reset').addEventListener('click', init);

    init();
  </script>
</body>
</html>
