<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f23;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #fff;
      padding: 20px;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      width: 100%;
      max-width: 420px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
    }

    .status {
      font-size: 1.25rem;
      font-weight: 600;
      min-height: 1.5em;
      text-align: center;
      padding: 8px 24px;
      border-radius: 8px;
      transition: all 0.2s ease;
    }

    .status.x-turn {
      color: #60a5fa;
    }

    .status.o-turn {
      color: #f472b6;
    }

    .status.winner {
      color: #4ade80;
      font-size: 1.5rem;
    }

    .status.draw {
      color: #fbbf24;
      font-size: 1.5rem;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      background: #1a1a2e;
      padding: 12px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      width: 100%;
      max-width: 360px;
    }

    .cell {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #25253a;
      border: none;
      border-radius: 12px;
      font-size: 3rem;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      transition: background-color 0.15s ease, transform 0.1s ease;
      user-select: none;
    }

    .cell:hover:not(.filled):not(.winning) {
      background: #32324a;
    }

    .cell:active:not(.filled):not(.winning) {
      transform: scale(0.95);
    }

    .cell.filled {
      cursor: default;
    }

    .cell.x {
      color: #60a5fa;
    }

    .cell.o {
      color: #f472b6;
    }

    .cell.winning {
      background: #1e3a2f;
      color: #4ade80;
      animation: win-pulse 0.6s ease-out;
    }

    @keyframes win-pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    .reset-btn {
      padding: 14px 48px;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: #3b82f6;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background-color 0.15s ease, transform 0.1s ease;
    }

    .reset-btn:hover {
      background: #2563eb;
    }

    .reset-btn:active {
      transform: scale(0.98);
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 1.75rem;
      }
      .cell {
        font-size: 2.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Tic-Tac-Toe</h1>
    <div class="status x-turn" id="status">X's turn</div>
    <div class="board" id="board" role="grid" aria-label="Tic-tac-toe board">
      <button class="cell" data-index="0" aria-label="Cell 1"></button>
      <button class="cell" data-index="1" aria-label="Cell 2"></button>
      <button class="cell" data-index="2" aria-label="Cell 3"></button>
      <button class="cell" data-index="3" aria-label="Cell 4"></button>
      <button class="cell" data-index="4" aria-label="Cell 5"></button>
      <button class="cell" data-index="5" aria-label="Cell 6"></button>
      <button class="cell" data-index="6" aria-label="Cell 7"></button>
      <button class="cell" data-index="7" aria-label="Cell 8"></button>
      <button class="cell" data-index="8" aria-label="Cell 9"></button>
    </div>
    <button class="reset-btn" id="reset">Reset</button>
  </div>

  <script>
    const WIN_LINES = [
      [0, 1, 2], [3, 4, 5], [6, 7, 8],
      [0, 3, 6], [1, 4, 7], [2, 5, 8],
      [0, 4, 8], [2, 4, 6]
    ];

    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const resetBtn = document.getElementById('reset');
    const cells = Array.from(boardEl.querySelectorAll('.cell'));

    let board = Array(9).fill(null);
    let currentPlayer = 'X';
    let gameOver = false;

    function updateStatus(message, className) {
      statusEl.textContent = message;
      statusEl.className = 'status ' + className;
    }

    function getWinningLine() {
      for (const line of WIN_LINES) {
        const [a, b, c] = line;
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return line;
        }
      }
      return null;
    }

    function highlightWinningCells(line) {
      line.forEach(i => {
        cells[i].classList.add('winning');
      });
    }

    function handleCellClick(e) {
      const cell = e.currentTarget;
      const index = parseInt(cell.dataset.index, 10);

      if (gameOver || board[index] !== null) {
        return;
      }

      board[index] = currentPlayer;
      cell.textContent = currentPlayer;
      cell.classList.add('filled', currentPlayer.toLowerCase());

      const winningLine = getWinningLine();
      if (winningLine) {
        gameOver = true;
        highlightWinningCells(winningLine);
        updateStatus(currentPlayer + ' wins!', 'winner');
        return;
      }

      if (board.every(cell => cell !== null)) {
        gameOver = true;
        updateStatus("It's a draw!", 'draw');
        return;
      }

      currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
      updateStatus(currentPlayer + "'s turn", currentPlayer.toLowerCase() + '-turn');
    }

    function resetGame() {
      board = Array(9).fill(null);
      currentPlayer = 'X';
      gameOver = false;

      cells.forEach(cell => {
        cell.textContent = '';
        cell.className = 'cell';
      });

      updateStatus("X's turn", 'x-turn');
    }

    cells.forEach(cell => {
      cell.addEventListener('click', handleCellClick);
    });

    resetBtn.addEventListener('click', resetGame);
  </script>
</body>
</html>
